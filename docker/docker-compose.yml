services:
  ai-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - "8096:8096"
    env_file:
      - ../.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ../models:/app/models:ro  # Mount models (read-only)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge